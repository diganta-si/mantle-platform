name: frontend

on:
  push:
    branches:
      - main
      - dev
    paths:
      - platform-frontend/**

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/diganta-si/mantle-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract SHA tag
        id: meta
        run: echo "sha_tag=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./platform-frontend
          file: ./platform-frontend/Dockerfile
          platforms: linux/arm64,linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha_tag }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Dispatch deploy to mantle-infra
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GHCR_PAT }}
          repository: diganta-si/mantle-infra
          event-type: deploy-frontend
          client-payload: |
            {
              "image": "${{ env.IMAGE_NAME }}",
              "tag": "${{ steps.meta.outputs.sha_tag }}",
              "branch": "${{ github.ref_name }}"
            }
